name: Application document review

on:
  push:
    branches:
      - concept/atoms-food-system-review
    paths:
      - resume.html
      - cover-letter.html
      - styles.css
      - brand-tokens.css
      - scripts/render-documents.mjs
      - .github/workflows/document-review.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: concept/atoms-food-system-review

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install document renderer
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Start local site
        run: |
          python3 -m http.server 4173 > /tmp/lab37-doc-server.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/resume.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/lab37-doc-server.log
          exit 1

      - name: Render PDFs from HTML
        run: node scripts/render-documents.mjs

      - name: Verify page counts and evidence
        run: |
          test "$(pdfinfo docs/Russell-Dudek-Lab37-Robotics-Product-Manager-Resume.pdf | awk '/^Pages:/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-Lab37-Robotics-Product-Manager-Cover-Letter.pdf | awk '/^Pages:/ {print $2}')" = "1"
          pdftotext docs/Russell-Dudek-Lab37-Robotics-Product-Manager-Resume.pdf - | grep -F "Prime Now launch team with Whole Foods"
          pdftotext docs/Russell-Dudek-Lab37-Robotics-Product-Manager-Resume.pdf - | grep -F "Food Safety Management certification"
          pdftotext docs/Russell-Dudek-Lab37-Robotics-Product-Manager-Resume.pdf - | grep -F "How I Would Contribute"
          pdftotext docs/Russell-Dudek-Lab37-Robotics-Product-Manager-Cover-Letter.pdf - | grep -F "Prime Now launch team with Whole Foods"
          pdftotext docs/Russell-Dudek-Lab37-Robotics-Product-Manager-Cover-Letter.pdf - | grep -F "Food Safety Management certification"

      - name: Commit regenerated PDFs to review branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/Russell-Dudek-Lab37-Robotics-Product-Manager-Resume.pdf docs/Russell-Dudek-Lab37-Robotics-Product-Manager-Cover-Letter.pdf
          if git diff --cached --quiet; then
            echo "PDFs already match the reviewed HTML."
          else
            git commit -m "Regenerate reviewed resume and cover letter PDFs"
            git push origin HEAD:concept/atoms-food-system-review
          fi
