name: Pin campaign dependencies

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pin official Lab37 assets and Three.js
        run: |
          set -euo pipefail
          mkdir -p assets/brand assets/vendor
          curl --fail --location --retry 3 'https://framerusercontent.com/images/yDgux3gwMTX6CNMOWK89q1iF0.jpg?height=3989&width=7990' -o assets/brand/bowl-builder-software.webp
          curl --fail --location --retry 3 'https://framerusercontent.com/images/vVl8hDczEIkSD0qxyPhetdotHA.svg?height=486&width=1164' -o assets/brand/bowl-builder-blueprint.svg
          curl --fail --location --retry 3 'https://unpkg.com/three@0.170.0/build/three.module.js' -o assets/vendor/three.module.js
          curl --fail --location --retry 3 'https://unpkg.com/three@0.170.0/LICENSE' -o assets/vendor/THREE-LICENSE.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/brand assets/vendor
          git commit -m 'Pin campaign dependencies'
          git push
